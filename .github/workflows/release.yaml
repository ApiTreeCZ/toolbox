name: Release

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      stable:
        description: 'Create stable release PR'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    uses: ApiTreeCZ/github-actions/.github/workflows/preflight.yml@main

  wait-for-checks:
    runs-on: ubuntu-latest
    needs:
      - preflight
    permissions:
      checks: read
    if: ${{ !cancelled() && needs.preflight.outputs.should-release == 'true' }}
    steps:
      - name: Wait for CI checks
        uses: poseidon/wait-for-status-checks@v0.6.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          match_pattern: '^(commitlint|manypkg|eslint|tsc|prettier|test)$'

  create-release-pr:
    runs-on: ubuntu-latest
    needs:
      - preflight
      - wait-for-checks
    if: ${{ success() && inputs.stable && github.ref_name == 'main' && needs.preflight.outputs.should-release == 'true' && needs.preflight.outputs.is-stable-release == 'false' }}
    steps:
      - name: Create release PR
        uses: ApiTreeCZ/github-actions/.github/actions/create-release-pr@main
        with:
          op-service-account-token: ${{ secrets.OP_APITREE_INFRA_SERVICE_ACCOUNT_TOKEN }}
          # language=bash
          before-script: |
            pnpm turbo run build --filter @apitree.cz/prettier-config

  create-snapshot-release:
    runs-on: ubuntu-latest
    needs:
      - preflight
      - wait-for-checks
    if: ${{ success() && (needs.preflight.outputs.is-release-pr == 'true' || (needs.preflight.outputs.should-release == 'true' && github.ref_name != 'main')) }}
    permissions:
      id-token: write
    steps:
      - name: Create snapshot release
        uses: ApiTreeCZ/github-actions/.github/actions/create-snapshot-release@main
        with:
          op-service-account-token: ${{ secrets.OP_APITREE_INFRA_SERVICE_ACCOUNT_TOKEN }}
          # language=bash
          before-script: |
            pnpm turbo run build --filter @apitree.cz/prettier-config

  create-stable-release:
    runs-on: ubuntu-latest
    needs:
      - preflight
      - wait-for-checks
    if: ${{ success() && needs.preflight.outputs.is-stable-release == 'true' }}
    permissions:
      id-token: write
    steps:
      - name: Create stable release
        uses: ApiTreeCZ/github-actions/.github/actions/create-stable-release@main
        with:
          op-service-account-token: ${{ secrets.OP_APITREE_INFRA_SERVICE_ACCOUNT_TOKEN }}
          # language=bash
          before-script: |
            pnpm turbo run build --filter @apitree.cz/prettier-config
