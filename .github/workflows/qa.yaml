name: QA

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up project
        uses: ApiTreeCZ/github-actions/.github/actions/setup-project@main
        with:
          op-service-account-token: ${{ secrets.OP_APITREE_INFRA_SERVICE_ACCOUNT_TOKEN }}

      - name: Run commitlint
        run: pnpm commitlint --from=${{ github.sha }}

  manypkg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up project
        uses: ApiTreeCZ/github-actions/.github/actions/setup-project@main
        with:
          op-service-account-token: ${{ secrets.OP_APITREE_INFRA_SERVICE_ACCOUNT_TOKEN }}

      - name: Run manypkg
        run: pnpm manypkg check

  eslint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up project
        uses: ApiTreeCZ/github-actions/.github/actions/setup-project@main
        with:
          op-service-account-token: ${{ secrets.OP_APITREE_INFRA_SERVICE_ACCOUNT_TOKEN }}

      - name: Run eslint
        uses: ApiTreeCZ/github-actions/.github/actions/turbo-run@main
        with:
          task: lint

  tsc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up project
        uses: ApiTreeCZ/github-actions/.github/actions/setup-project@main
        with:
          op-service-account-token: ${{ secrets.OP_APITREE_INFRA_SERVICE_ACCOUNT_TOKEN }}

      - name: Run tsc
        uses: ApiTreeCZ/github-actions/.github/actions/turbo-run@main
        with:
          task: ts

  prettier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up project
        uses: ApiTreeCZ/github-actions/.github/actions/setup-project@main
        with:
          op-service-account-token: ${{ secrets.OP_APITREE_INFRA_SERVICE_ACCOUNT_TOKEN }}

      - name: Run prettier
        uses: ApiTreeCZ/github-actions/.github/actions/turbo-run@main
        with:
          task: format

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up project
        uses: ApiTreeCZ/github-actions/.github/actions/setup-project@main
        with:
          op-service-account-token: ${{ secrets.OP_APITREE_INFRA_SERVICE_ACCOUNT_TOKEN }}

      - name: Run tests
        uses: ApiTreeCZ/github-actions/.github/actions/turbo-run@main
        with:
          task: test
