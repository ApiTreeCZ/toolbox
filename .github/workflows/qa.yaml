name: QA

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up project
        uses: ./.github/actions/setup

      - name: Run commitlint
        run: pnpm commitlint --from=${{ github.sha }}

  manypkg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up project
        uses: ./.github/actions/setup

      - name: Run manypkg
        run: pnpm manypkg check

  eslint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up project
        uses: ./.github/actions/setup

      - name: Run eslint
        run: pnpm run lint

  tsc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up project
        uses: ./.github/actions/setup

      - name: Run tsc
        run: pnpm run ts

  prettier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up project
        uses: ./.github/actions/setup

      - name: Run prettier
        run: pnpm run format

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up project
        uses: ./.github/actions/setup

      - name: Run tests
        run: pnpm run test
