name: Setup
description: Setup monorepo for CI

runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@v6

    - name: Set up node.js
      uses: actions/setup-node@v6
      with:
        cache: pnpm
        node-version-file: 'package.json'

    - name: Turbo cache
      uses: actions/cache@v5
      with:
        path: .turbo
        key: turbo-cache-${{ runner.os }}-${{ runner.arch }}-${{ github.sha }}
        restore-keys: |
          turbo-cache-${{ runner.os }}-${{ runner.arch }}-

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline
