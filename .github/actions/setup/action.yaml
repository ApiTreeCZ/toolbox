name: Setup
description: Setup monorepo for CI

runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@v5

    - name: Set up node.js
      uses: actions/setup-node@v6
      with:
        cache: pnpm
        node-version-file: 'package.json'

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline
