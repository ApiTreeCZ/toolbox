name: Setup
description: Setup monorepo for CI

inputs:
  op-service-account-token:
    description: '1Password service account token'
    required: true

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: ApiTreeCZ/github-actions/setup-node-action@main

    - name: Set up Turbo
      uses: ApiTreeCZ/github-actions/setup-turbo-action@main
      with:
        op-service-account-token: ${{ inputs.op-service-account-token }}

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline
