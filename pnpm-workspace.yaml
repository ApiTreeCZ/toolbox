allowBuilds:
  '@swc/core': true
  esbuild: true
  unrs-resolver: true

autoInstallPeers: false

enablePrePostScripts: true

engineStrict: true

onlyBuiltDependencies:
  - '@swc/core'
  - 'esbuild'
  - 'unrs-resolver'

packages:
  - packages/*

publicHoistPattern:
  - '*eslint*'
  - '*prettier*'
  - '*vitest*'

strictPeerDependencies: true
